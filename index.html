<!DOCTYPE html>
<html>
<head>
  <title>Smart Mirror</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="particles"></canvas>
<div class="container">

  <!-- TOP -->
  <div class="top">
    <div>
      <div id="time"></div>
      <div id="date"></div>
    </div>

    <div id="weather"></div>
  </div>

  <!-- CENTER -->
  <div class="center">

    <!-- ALERT -->
    <div id="alertBox" class="alert hidden">
      ⚠️ Air Quality Poor!
    </div>

    <!-- ANNOUNCEMENTS -->
    <div class="card">
      <h2>📢 Announcements</h2>
      <ul id="announcements"></ul>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <div class="card">
      <h2>📅 Timetable</h2>
      <ul id="timetable"></ul>
    </div>
  </div>

  <!-- BOTTOM -->
 <div class="bottom">

  <div class="sensor-box">
    🌡️ Temp
    <div id="temp">--</div>
  </div>

  <div class="sensor-box">
    💧 Humidity
    <div id="hum">--</div>
  </div>

  <div class="sensor-box">
    🌫️ Air
    <div id="air">--</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
